<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Cafetería ITH</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/favicon/apple-touch-icon.png">
    <link rel="manifest" href="../assets/images/favicon/site.webmanifest">
    <meta name="theme-color" content="#0b265c">

    <!-- Accesibilidad -->
    <script src="../assets/js/config/accesibilidad.init.js"></script>

    <script src="../assets/js/config/bootstrap.loader.js"></script>

    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/accesibilidad.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <div id="dash-header"></div>

    <div class="dash-wrapper">
        <div id="dash-sidebar"></div>

        <main class="dash-main flex-grow-1 p-4">

            <div class="position-relative d-flex align-items-center mb-4">
                <h2 class="mb-0 w-100 text-center">
                    <i class="bi bi-people me-2"></i>Usuarios
                </h2>
                <div class="position-absolute end-0">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#agregarUsuarioModal">
                        <i class="bi bi-person-plus me-1"></i>Agregar Usuario
                    </button>
                </div>
            </div>

            <!-- Tarjetas de estadísticas -->
            <div class="row g-3 mb-4">
                <div class="col-sm-6 col-xl-3">
                    <div class="card text-white bg-primary h-100">
                        <div class="card-body">
                            <h5 class="card-title">Total Usuarios</h5>
                            <h3 class="mb-0" id="stat-total">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card text-white bg-success h-100">
                        <div class="card-body">
                            <h5 class="card-title">Usuarios Activos</h5>
                            <h3 class="mb-0" id="stat-activos">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card text-white bg-warning h-100">
                        <div class="card-body">
                            <h5 class="card-title">Administradores</h5>
                            <h3 class="mb-0" id="stat-admins">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card text-white bg-info h-100">
                        <div class="card-body">
                            <h5 class="card-title">Estudiantes</h5>
                            <h3 class="mb-0" id="stat-estudiantes">--</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabla de usuarios -->
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <h5 class="mb-0">Listado de Usuarios</h5>
                        <div class="d-flex gap-2 flex-wrap">
                            <select id="ordenar-usuarios" class="form-select form-select-sm" style="max-width:160px;">
                                <option value="nombre-asc">Nombre A→Z</option>
                                <option value="nombre-desc">Nombre Z→A</option>
                            </select>
                            <select id="filtro-rol" class="form-select form-select-sm" style="max-width:160px;">
                                <option value="">Todos los roles</option>
                                <option value="administrador">Administrador</option>
                                <option value="trabajador">Trabajador</option>
                                <option value="estudiante">Estudiante</option>
                                <option value="empleado">Empleado</option>
                            </select>
                            <select id="filtro-estado" class="form-select form-select-sm" style="max-width:130px;">
                                <option value="">Todos</option>
                                <option value="activo">Activos</option>
                                <option value="inactivo">Inactivos</option>
                            </select>
                            <input type="text" id="buscador-usuarios" class="form-control form-select-sm"
                                placeholder="Buscar usuario...">
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Nombre / Matrícula</th>
                                    <th>Correo</th>
                                    <th>Rol</th>
                                    <th width="130">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-usuarios">
                                <tr>
                                    <td colspan="4" class="text-center py-4 text-muted">Cargando usuarios...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Agregar Usuario -->
    <div class="modal fade" id="agregarUsuarioModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="bi bi-person-plus me-2"></i>Agregar Nuevo Usuario</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Nombre(s) *</label>
                            <input type="text" id="agregar-nombre" class="form-control" placeholder="Nombre(s)">
                            <div class="invalid-feedback" id="agregar-nombre-error"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Apellido Paterno *</label>
                            <input type="text" id="agregar-apellido-paterno" class="form-control">
                            <div class="invalid-feedback" id="agregar-ap-error"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Apellido Materno</label>
                            <input type="text" id="agregar-apellido-materno" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Correo *</label>
                            <input type="email" id="agregar-correo" class="form-control"
                                placeholder="correo@ejemplo.com">
                            <div class="invalid-feedback" id="agregar-correo-error"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Nombre de Usuario *</label>
                            <input type="text" id="agregar-username" class="form-control" placeholder="usuario123">
                            <div class="invalid-feedback" id="agregar-username-error"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Contraseña *</label>
                            <div class="input-group">
                                <input type="password" id="agregar-password" class="form-control">
                                <button class="btn btn-outline-secondary" type="button" id="toggle-agregar-password">
                                    <i class="bi bi-eye" id="ico-agregar-password"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback" id="agregar-password-error"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Matrícula</label>
                            <input type="text" id="agregar-matricula" class="form-control" placeholder="ABC123456">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Rol *</label>
                            <select id="agregar-rol" class="form-select">
                                <option value="">Seleccionar rol</option>
                                <!-- Opciones cargadas dinámicamente desde GET /api/roles -->
                            </select>
                            <div class="invalid-feedback" id="agregar-rol-error"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Carrera</label>
                            <select id="agregar-carrera" class="form-select">
                                <option value="">Sin carrera</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" id="agregar-telefono" class="form-control" placeholder="7711234567"
                                maxlength="10">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btn-guardar-usuario">
                        <i class="bi bi-floppy me-1"></i>Guardar Usuario
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Editar Usuario -->
    <div class="modal fade" id="editarUsuarioModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Editar Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editar-id">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Nombre(s) *</label>
                            <input type="text" id="editar-nombre" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Apellido Paterno *</label>
                            <input type="text" id="editar-apellido-paterno" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Apellido Materno</label>
                            <input type="text" id="editar-apellido-materno" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Correo</label>
                            <input type="email" id="editar-correo" class="form-control" readonly>
                            <small class="text-muted">El correo no se puede modificar</small>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Nombre de Usuario</label>
                            <input type="text" id="editar-username" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Rol *</label>
                            <select id="editar-rol" class="form-select">
                                <!-- Opciones cargadas dinámicamente desde GET /api/roles -->
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Carrera</label>
                            <select id="editar-carrera" class="form-select">
                                <option value="">Sin carrera</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" id="editar-telefono" class="form-control" maxlength="10">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Nueva contraseña <small class="text-muted">(vacío = sin
                                    cambios)</small></label>
                            <div class="input-group">
                                <input type="password" id="editar-password" class="form-control"
                                    placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                                <button class="btn btn-outline-secondary" type="button" id="toggle-editar-password"
                                    title="Mostrar/ocultar">
                                    <i class="bi bi-eye" id="ico-editar-password"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch mt-2">
                                <input class="form-check-input" type="checkbox" id="editar-estado">
                                <label class="form-check-label" for="editar-estado">Usuario activo</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-warning" id="btn-actualizar-usuario">
                        <i class="bi bi-floppy me-1"></i>Actualizar Usuario
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detalles: usuarios -->
    <div class="modal fade" id="detalleUsuarioModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header" style="background:var(--color-primario,#1E3A5F);color:#fff;">
                    <h5 class="modal-title">
                        <i class="bi bi-person-circle me-2"></i>Detalle del Usuario
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detalle-usuario-body">
                    <div class="text-center py-4">
                        <span class="spinner-border text-primary"></span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/config/api.config.js"></script>
    <script src="../assets/js/utils/auth.utils.js"></script>
    <script src="../assets/js/utils/toast.utils.js"></script>
    <script src="../assets/js/utils/format.utils.js"></script>

    <script src="../assets/js/components/dash-header.js"></script>
    <script src="../assets/js/components/dash-sidebar.js"></script>
    <script src="../assets/js/services/auth.service.js"></script>

    <script src="../assets/js/pages/dashboard/usuarios.js"></script>

    <link rel="stylesheet" href="../assets/css/notificaciones.panel.css">
    <script src="../assets/js/components/notificaciones.panel.js"></script>

    <script src="../assets/js/components/accesibilidad.panel.js"></script>
</body>

</html>
