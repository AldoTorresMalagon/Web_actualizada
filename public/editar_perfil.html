<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - Cafetería ITH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <div id="dash-header"></div>

    <div class="d-flex flex-grow-1">
        <div id="dash-sidebar"></div>

        <main class="dash-main flex-grow-1 p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Editar Perfil</h2>
                <a href="index.html" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Volver al Dashboard
                </a>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">

                    <!-- Alertas -->
                    <div id="alerta-success" class="alert alert-success alert-dismissible fade show d-none">
                        <i class="bi bi-check-circle me-2"></i><span id="alerta-success-texto"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div id="alerta-error" class="alert alert-danger alert-dismissible fade show d-none">
                        <i class="bi bi-exclamation-triangle me-2"></i><span id="alerta-error-texto"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Información Personal -->
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0"><i class="bi bi-person me-2"></i>Información Personal</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Nombre(s) *</label>
                                    <input type="text" id="perfil-nombre" class="form-control">
                                    <div class="invalid-feedback" id="perfil-nombre-error"></div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Apellido Paterno *</label>
                                    <input type="text" id="perfil-apellido-paterno" class="form-control">
                                    <div class="invalid-feedback" id="perfil-ap-error"></div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Apellido Materno</label>
                                    <input type="text" id="perfil-apellido-materno" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Correo Electrónico</label>
                                    <input type="email" id="perfil-correo" class="form-control" readonly>
                                    <small class="text-muted">El correo no se puede modificar</small>
                                </div>
                                <div class="col-md-6">
                                    <!-- Campo exclusivo del dashboard: nombre de usuario -->
                                    <label class="form-label">Nombre de Usuario</label>
                                    <input type="text" id="perfil-username" class="form-control"
                                        placeholder="usuario123">
                                    <div class="invalid-feedback" id="perfil-username-error"></div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Teléfono</label>
                                    <input type="tel" id="perfil-telefono" class="form-control" placeholder="7711234567"
                                        maxlength="10">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Edad</label>
                                    <input type="number" id="perfil-edad" class="form-control" min="16" max="80">
                                </div>
                                <div class="col-md-4">
                                    <!-- Campo exclusivo del dashboard: carrera -->
                                    <label class="form-label">Carrera</label>
                                    <select id="perfil-carrera" class="form-select">
                                        <option value="">Sin carrera</option>
                                        <!-- JS puebla -->
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Cambiar Contraseña -->
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header">
                            <h5 class="mb-0"><i class="bi bi-shield-lock me-2"></i>Cambiar Contraseña</h5>
                        </div>
                        <div class="card-body">
                            <p class="text-muted small mb-3">Deja estos campos vacíos si no deseas cambiar tu
                                contraseña.</p>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Contraseña Actual</label>
                                    <div class="input-group">
                                        <input type="password" id="password-actual" class="form-control"
                                            placeholder="••••••••">
                                        <button class="btn btn-outline-secondary" type="button"
                                            id="toggle-password-actual">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Nueva Contraseña</label>
                                    <div class="input-group">
                                        <input type="password" id="password-nueva" class="form-control"
                                            placeholder="••••••••">
                                        <button class="btn btn-outline-secondary" type="button"
                                            id="toggle-password-nueva">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                    <div class="invalid-feedback" id="password-nueva-error"></div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Confirmar Contraseña</label>
                                    <div class="input-group">
                                        <input type="password" id="password-confirmar" class="form-control"
                                            placeholder="••••••••">
                                        <button class="btn btn-outline-secondary" type="button"
                                            id="toggle-password-confirmar">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                    <div class="invalid-feedback" id="password-confirmar-error"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Botones de acción -->
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="index.html" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i>Cancelar
                        </a>
                        <button type="button" class="btn btn-primary" id="btn-guardar-perfil">
                            <i class="bi bi-floppy me-1"></i>Guardar Cambios
                        </button>
                    </div>

                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/components/dash-header.js"></script>
    <script src="../assets/js/components/dash-sidebar.js"></script>
    <script src="../assets/js/pages/dashboard/editar_perfil.js"></script>
</body>

</html>
