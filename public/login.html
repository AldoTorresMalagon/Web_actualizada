<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Cafetería ITH</title>

    <!-- Accesibilidad -->
    <script src="../assets/js/config/accesibilidad.init.js"></script>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Estilos globales -->
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/accesibilidad.css">
    <link rel="stylesheet" href="../assets/css/pages/login.css">

    <!-- Google reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js?render=6LdoBYQsAAAAAI78LHtA2ULBDw9CtUv2h1UIISe8" async
        defer></script>
</head>

<body class="d-flex flex-column min-vh-100">

    <div id="header"></div>

    <main class="flex-grow-1 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">

                    <div class="card shadow-lg border-0">

                        <!-- Encabezado -->
                        <div class="card-header bg-primary text-white text-center py-4">
                            <h3 class="mb-0">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                            </h3>
                        </div>

                        <div class="card-body p-4">

                            <!-- Alerta de error -->
                            <div id="alerta-error"
                                class="alert alert-danger alert-custom alert-dismissible fade show d-none" role="alert">
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-exclamation-triangle me-2 fs-5"></i>
                                    <div>
                                        <strong>Error:</strong> <span id="alerta-error-msg"></span>
                                    </div>
                                </div>
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>

                            <!-- Formulario -->
                            <div id="loginForm">

                                <!-- Correo -->
                                <div class="mb-3">
                                    <label for="correo" class="form-label">
                                        <i class="bi bi-envelope me-1"></i>Correo Electrónico
                                        <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light">
                                            <i class="bi bi-envelope-at"></i>
                                        </span>
                                        <input type="email" class="form-control" id="correo" name="correo"
                                            placeholder="ejemplo@ith.edu.mx" autocomplete="email">
                                    </div>
                                    <div class="invalid-feedback d-block" id="correo-error"></div>
                                </div>

                                <!-- Contraseña -->
                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        <i class="bi bi-key me-1"></i>Contraseña
                                        <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light">
                                            <i class="bi bi-shield-lock"></i>
                                        </span>
                                        <input type="password" class="form-control" id="password" name="password"
                                            placeholder="Mínimo 6 caracteres" autocomplete="current-password">
                                        <button type="button" class="btn btn-outline-secondary toggle-password"
                                            tabindex="-1">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                    <div class="invalid-feedback d-block" id="password-error"></div>
                                    <div class="form-text">
                                        <i class="bi bi-info-circle me-1"></i>
                                        La contraseña debe tener al menos 6 caracteres
                                    </div>
                                </div>

                                <!-- Botón -->
                                <div class="d-grid gap-2">
                                    <button type="button" id="btn-login" class="btn btn-primary btn-lg">
                                        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                                    </button>
                                </div>

                            </div>

                            <!-- Links inferiores -->
                            <div class="text-center mt-4">
                                <div class="mb-3">
                                    <a href="recuperar_password.html" class="text-decoration-none text-primary">
                                        <i class="bi bi-question-circle me-1"></i>¿Olvidaste tu contraseña?
                                    </a>
                                </div>

                                <p class="mb-2">¿No tienes cuenta?</p>
                                <a href="registro.html" class="btn btn-outline-primary mb-2">
                                    <i class="bi bi-person-plus me-2"></i>Regístrate aquí
                                </a>

                                <div class="mt-3">
                                    <a href="inicio.html" class="btn btn-outline-secondary">
                                        <i class="bi bi-arrow-left me-2"></i>Volver al Inicio
                                    </a>
                                </div>

                                <!-- Leyenda de ayuda -->
                                <div class="mt-3">
                                    <small class="text-muted">
                                        <i class="bi bi-lightbulb me-1"></i>
                                        Si tienes problemas para iniciar sesión, contacta al administrador.
                                    </small>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Config y utils -->
    <script src="../assets/js/config/api.config.js"></script>
    <script src="../assets/js/utils/toast.utils.js"></script>
    <script src="../assets/js/utils/auth.utils.js"></script>

    <!-- Componentes -->
    <script src="../assets/js/components/header.js"></script>
    <script src="../assets/js/components/footer.js"></script>

    <!-- Lógica de esta página -->
    <script src="../assets/js/services/auth.service.js"></script>
    <script src="../assets/js/pages/login.js"></script>

    <script src="../assets/js/components/accesibilidad.panel.js"></script>
</body>

</html>
