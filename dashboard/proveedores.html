<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores - Cafetería ITH</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/favicon/apple-touch-icon.png">
    <link rel="manifest" href="../assets/images/favicon/site.webmanifest">
    <meta name="theme-color" content="#0b265c">

    <!-- Accesibilidad -->
    <script src="../assets/js/config/accesibilidad.init.js"></script>

    <script src="../assets/js/config/bootstrap.loader.js"></script>

    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/accesibilidad.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <div id="dash-header"></div>

    <div class="dash-wrapper">
        <div id="dash-sidebar"></div>

        <main class="dash-main flex-grow-1 p-4">

            <div class="position-relative d-flex align-items-center mb-4">
                <h2 class="mb-0 w-100 text-center">
                    <i class="bi bi-truck me-2"></i>Proveedores
                </h2>
                <div class="position-absolute end-0">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#agregarProveedorModal">
                        <i class="bi bi-plus-circle me-1"></i>Agregar Proveedor
                    </button>
                </div>
            </div>

            <!-- Tarjetas de estadísticas -->
            <div class="row g-3 mb-4">
                <div class="col-sm-4">
                    <div class="card text-white bg-primary h-100">
                        <div class="card-body">
                            <h5 class="card-title">Total Proveedores</h5>
                            <h3 class="mb-0" id="stat-total">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="card text-white bg-success h-100">
                        <div class="card-body">
                            <h5 class="card-title">Con Distribuidora</h5>
                            <h3 class="mb-0" id="stat-con-distribuidora">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="card text-white bg-warning h-100">
                        <div class="card-body">
                            <h5 class="card-title">Sin Distribuidora</h5>
                            <h3 class="mb-0" id="stat-sin-distribuidora">--</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabla de proveedores -->
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <h5 class="mb-0">Listado de Proveedores</h5>
                        <div class="d-flex gap-2 flex-wrap">
                            <select id="ordenar-proveedores" class="form-select form-select-sm"
                                style="max-width:160px;">
                                <option value="nombre-asc">Nombre A→Z</option>
                                <option value="nombre-desc">Nombre Z→A</option>
                            </select>
                            <input type="text" id="buscador-proveedores" class="form-control form-select-sm"
                                placeholder="Buscar proveedor...">
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>Distribuidora</th>
                                    <th>Teléfono</th>
                                    <th>Correo</th>
                                    <th width="90">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-proveedores">
                                <tr>
                                    <td colspan="8" class="text-center py-4 text-muted">Cargando proveedores...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Agregar Proveedor -->
    <div class="modal fade" id="agregarProveedorModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Agregar Proveedor</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre *</label>
                            <input type="text" id="agregar-nombre" class="form-control"
                                placeholder="Nombre del proveedor">
                            <div class="invalid-feedback" id="agregar-nombre-error"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Persona de Contacto</label>
                            <input type="text" id="agregar-contacto" class="form-control"
                                placeholder="Nombre del contacto">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" id="agregar-telefono" class="form-control" placeholder="7711234567"
                                maxlength="10">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" id="agregar-email" class="form-control"
                                placeholder="proveedor@ejemplo.com">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Dirección</label>
                            <input type="text" id="agregar-direccion" class="form-control"
                                placeholder="Dirección del proveedor">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Notas</label>
                            <textarea id="agregar-notas" class="form-control" rows="2"
                                placeholder="Información adicional..."></textarea>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="agregar-estado" checked>
                                <label class="form-check-label" for="agregar-estado">Proveedor activo</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btn-guardar-proveedor">
                        <i class="bi bi-floppy me-1"></i>Guardar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Editar Proveedor -->
    <div class="modal fade" id="editarProveedorModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Editar Proveedor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editar-id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre *</label>
                            <input type="text" id="editar-nombre" class="form-control">
                            <div class="invalid-feedback" id="editar-nombre-error"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Persona de Contacto</label>
                            <input type="text" id="editar-contacto" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" id="editar-telefono" class="form-control" maxlength="10">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" id="editar-email" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Dirección</label>
                            <input type="text" id="editar-direccion" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Notas</label>
                            <textarea id="editar-notas" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="editar-estado">
                                <label class="form-check-label" for="editar-estado">Proveedor activo</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-warning" id="btn-actualizar-proveedor">
                        <i class="bi bi-floppy me-1"></i>Actualizar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detalles: proveedores -->
    <div class="modal fade" id="detalleProveedorModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header" style="background:var(--color-primario,#1E3A5F);color:#fff;">
                    <h5 class="modal-title">
                        <i class="bi bi-truck me-2"></i>Detalle del Proveedor
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detalle-proveedor-body">
                    <div class="text-center py-4">
                        <span class="spinner-border text-primary"></span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/config/api.config.js"></script>
    <script src="../assets/js/utils/auth.utils.js"></script>
    <script src="../assets/js/utils/toast.utils.js"></script>
    <script src="../assets/js/utils/format.utils.js"></script>

    <script src="../assets/js/components/dash-header.js"></script>
    <script src="../assets/js/components/dash-sidebar.js"></script>
    <script src="../assets/js/services/productos.service.js"></script>

    <script src="../assets/js/pages/dashboard/proveedores.js"></script>

    <link rel="stylesheet" href="../assets/css/notificaciones.panel.css">
    <script src="../assets/js/components/notificaciones.panel.js"></script>

    <script src="../assets/js/components/accesibilidad.panel.js"></script>
</body>

</html>
