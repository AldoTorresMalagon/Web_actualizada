<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías - Cafetería ITH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <div id="dash-header"></div>

    <div class="d-flex flex-grow-1">
        <div id="dash-sidebar"></div>

        <main class="dash-main flex-grow-1 p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0"><i class="bi bi-tags me-2"></i>Categorías</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#agregarCategoriaModal">
                    <i class="bi bi-plus-circle me-1"></i>Agregar Categoría
                </button>
            </div>

            <!-- Tarjetas de estadísticas -->
            <div class="row g-3 mb-4">
                <div class="col-sm-4">
                    <div class="card text-white bg-primary h-100">
                        <div class="card-body">
                            <h5 class="card-title">Total Categorías</h5>
                            <h3 class="mb-0" id="stat-total">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="card text-white bg-success h-100">
                        <div class="card-body">
                            <h5 class="card-title">Categorías Activas</h5>
                            <h3 class="mb-0" id="stat-activas">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="card text-white bg-warning h-100">
                        <div class="card-body">
                            <h5 class="card-title">Total Productos</h5>
                            <h3 class="mb-0" id="stat-productos">--</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabla de categorías -->
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">Listado de Categorías</h5>
                        <input type="text" id="buscador-categorias" class="form-control form-control-sm"
                            class="filter-search" placeholder="Buscar categoría...">
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>#</th>
                                    <th>Nombre</th>
                                    <th>Descripción</th>
                                    <th>Productos</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-categorias">
                                <tr>
                                    <td colspan="6" class="text-center py-4 text-muted">Cargando categorías...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Agregar Categoría -->
    <div class="modal fade" id="agregarCategoriaModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Agregar Categoría</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre *</label>
                        <input type="text" id="agregar-nombre" class="form-control"
                            placeholder="Nombre de la categoría">
                        <div class="invalid-feedback" id="agregar-nombre-error"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="agregar-descripcion" class="form-control" rows="3"
                            placeholder="Descripción de la categoría"></textarea>
                    </div>
                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="agregar-estado" checked>
                            <label class="form-check-label" for="agregar-estado">Categoría activa</label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btn-guardar-categoria">
                        <i class="bi bi-floppy me-1"></i>Guardar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Editar Categoría -->
    <div class="modal fade" id="editarCategoriaModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Editar Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editar-id">
                    <div class="mb-3">
                        <label class="form-label">Nombre *</label>
                        <input type="text" id="editar-nombre" class="form-control">
                        <div class="invalid-feedback" id="editar-nombre-error"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="editar-descripcion" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="editar-estado">
                            <label class="form-check-label" for="editar-estado">Categoría activa</label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-warning" id="btn-actualizar-categoria">
                        <i class="bi bi-floppy me-1"></i>Actualizar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/components/dash-header.js"></script>
    <script src="../assets/js/components/dash-sidebar.js"></script>
    <script src="../assets/js/pages/dashboard/categorias.js"></script>
</body>

</html>
