<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - Cafetería ITH</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/favicon/apple-touch-icon.png">
    <link rel="manifest" href="../assets/images/favicon/site.webmanifest">
    <meta name="theme-color" content="#0b265c">

    <!-- Accesibilidad -->
    <script src="../assets/js/config/accesibilidad.init.js"></script>
    <script src="../assets/js/config/bootstrap.loader.js"></script>

    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/accesibilidad.css">
    <link rel="stylesheet" href="../assets/css/pages/carrito.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <div id="header"></div>
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <main class="container my-5 flex-grow-1 fade-in">

        <!-- Encabezado -->
        <div class="text-center mb-4">
            <h2 class="display-5 mb-2">
                <i class="bi bi-cart3 me-2"></i>Mi Carrito
            </h2>
            <p class="text-muted">Revisa tu pedido antes de confirmar</p>
        </div>

        <!-- Alertas -->
        <div id="alerta-error" class="alert alert-danger d-none" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span id="alerta-error-msg"></span>
        </div>
        <div id="alerta-success" class="alert alert-success d-none" role="alert">
            <i class="bi bi-check-circle me-2"></i>
            <span id="alerta-success-msg"></span>
        </div>

        <!-- Estado: cargando -->
        <div id="carrito-loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Cargando carrito...</p>
        </div>

        <!-- Estado: vacío -->
        <div id="carrito-vacio" class="text-center py-5 d-none">
            <i class="bi bi-cart-x" style="font-size:4rem; color: var(--color-primario); opacity:.4;"></i>
            <h4 class="mt-3 mb-2">Tu carrito está vacío</h4>
            <p class="text-muted mb-4">Agrega productos desde el menú para comenzar</p>
            <div class="d-flex gap-3 justify-content-center flex-wrap">
                <a href="menu.html" class="btn btn-outline-primary">
                    <i class="bi bi-cup-hot me-1"></i>Ver Comidas
                </a>
                <a href="productos.html" class="btn btn-outline-primary">
                    <i class="bi bi-bag me-1"></i>Ver Productos
                </a>
                <a href="bebidas.html" class="btn btn-outline-primary">
                    <i class="bi bi-cup-straw me-1"></i>Ver Bebidas
                </a>
            </div>
        </div>

        <!-- Estado: con productos -->
        <div id="carrito-con-productos" class="d-none">
            <div class="row g-4">

                <!-- Tabla de productos -->
                <div class="col-lg-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">
                                <i class="bi bi-list-ul me-2"></i>Productos
                            </h5>
                            <button class="btn btn-outline-danger btn-sm" id="btn-vaciar">
                                <i class="bi bi-trash me-1"></i>Vaciar carrito
                            </button>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Producto</th>
                                            <th>Precio</th>
                                            <th>Cantidad</th>
                                            <th>Subtotal</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody id="carrito-tbody"></tbody>
                                </table>
                            </div>
                        </div>
                        <div class="card-footer text-end">
                            <button class="btn btn-outline-secondary btn-sm" id="btn-actualizar">
                                <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Resumen y pago -->
                <div class="col-lg-4">
                    <div class="card shadow-sm border-0">
                        <div class="card-header">
                            <h5 class="mb-0">
                                <i class="bi bi-receipt me-2"></i>Resumen
                            </h5>
                        </div>
                        <div class="card-body">

                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Subtotal</span>
                                <span id="carrito-total" class="fw-bold">$0.00 MXN</span>
                            </div>
                            <hr>

                            <div class="mb-3">
                                <label for="metodo-pago" class="form-label fw-semibold">
                                    <i class="bi bi-credit-card me-1"></i>Método de pago
                                </label>
                                <select class="form-select" id="metodo-pago">
                                    <option value="">Cargando...</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="monto-pagar" class="form-label fw-semibold">
                                    <i class="bi bi-cash me-1"></i>Monto a pagar
                                </label>
                                <input type="text" class="form-control readonly-field" id="monto-pagar" readonly>
                            </div>

                            <div class="d-grid">
                                <button class="btn btn-primary btn-lg" id="btn-confirmar-pedido">
                                    <i class="bi bi-check-circle me-2"></i>Confirmar Pedido
                                </button>
                            </div>

                        </div>
                    </div>

                    <!-- Seguir comprando -->
                    <div class="mt-3">
                        <a href="inicio.html" class="btn btn-outline-secondary w-100">
                            <i class="bi bi-arrow-left me-1"></i>Seguir comprando
                        </a>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <div id="footer"></div>


    <script src="../assets/js/config/api.config.js"></script>
    <script src="../assets/js/utils/toast.utils.js"></script>
    <script src="../assets/js/utils/format.utils.js"></script>
    <script src="../assets/js/utils/auth.utils.js"></script>

    <script src="../assets/js/components/header.js"></script>
    <script src="../assets/js/components/navbar.js"></script>
    <script src="../assets/js/components/footer.js"></script>
    <script src="../assets/js/services/carrito.service.js"></script>
    <script src="../assets/js/pages/carrito.js"></script>

    <script src="../assets/js/components/accesibilidad.panel.js"></script>
    
    <link rel="stylesheet" href="../assets/css/notificaciones.panel.css">
    <script src="../assets/js/components/notificaciones.publica.js"></script>
</body>

</html>
