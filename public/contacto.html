<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Cafetería ITH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <div id="header"></div>
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <main class="container my-5 flex-grow-1 fade-in">
        <div class="row">
            <div class="col-12">

                <h2 class="text-center mb-2">
                    <i class="bi bi-telephone me-2"></i>Contáctanos
                </h2>
                <p class="text-center text-muted mb-5">
                    Estamos aquí para atenderte. No dudes en contactarnos
                </p>

                <!-- Teléfono, Email, WhatsApp -->
                <div class="row g-4 mb-5">

                    <div class="col-md-4">
                        <div class="card h-100 text-center contact-card">
                            <div class="card-body">
                                <div class="contact-icon text-primary">
                                    <i class="bi bi-telephone-fill"></i>
                                </div>
                                <h5 class="card-title">Teléfono</h5>
                                <p class="card-text" id="info-telefono">Cargando...</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card h-100 text-center contact-card">
                            <div class="card-body">
                                <div class="contact-icon text-primary">
                                    <i class="bi bi-envelope-fill"></i>
                                </div>
                                <h5 class="card-title">Email</h5>
                                <p class="card-text" id="info-email">Cargando...</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card h-100 text-center contact-card">
                            <div class="card-body">
                                <div class="contact-icon text-primary">
                                    <i class="bi bi-whatsapp"></i>
                                </div>
                                <h5 class="card-title">WhatsApp</h5>
                                <p class="card-text" id="info-whatsapp">Cargando...</p>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Ubicación -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h4 class="card-title mb-3">
                            <i class="bi bi-geo-alt-fill me-2"></i>Ubicación
                        </h4>
                        <p class="card-text" id="info-direccion">Cargando...</p>
                    </div>
                </div>

                <!-- Horarios -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h4 class="card-title mb-3">
                            <i class="bi bi-clock-fill me-2"></i>Horarios de Atención
                        </h4>
                        <div class="row">
                            <div class="col-md-6">
                                <p><strong>Horario:</strong> <span id="info-horario">Cargando...</span></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong>Días de servicio:</strong> <span id="info-dias">Cargando...</span></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <a href="inicio.html" class="btn btn-primary btn-lg">
                        <i class="bi bi-arrow-left me-2"></i>Volver al Inicio
                    </a>
                </div>

            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/components/header.js"></script>
    <script src="../assets/js/components/navbar.js"></script>
    <script src="../assets/js/components/footer.js"></script>
    <script src="../assets/js/pages/contacto.js"></script>
</body>

</html>
