<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubicación - Cafetería ITH</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/favicon/apple-touch-icon.png">
    <link rel="manifest" href="../assets/images/favicon/site.webmanifest">
    <meta name="theme-color" content="#0b265c">

    <!-- Accesibilidad -->
    <script src="../assets/js/config/accesibilidad.init.js"></script>
    <script src="../assets/js/config/bootstrap.loader.js"></script>


    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/accesibilidad.css">
    <link rel="stylesheet" href="../assets/css/pages/ubicacion.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <div id="header"></div>
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <main class="container my-5 flex-grow-1 fade-in">
        <div class="row justify-content-center">
            <div class="col-lg-10">

                <h2 class="text-center mb-1">
                    <i class="bi bi-geo-alt-fill me-2 text-primary"></i>Encuéntranos
                </h2>
                <p class="text-center text-muted mb-4">Instituto Tecnológico de Huejutla · Cafetería</p>

                <!-- Mapa interactivo -->
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-map me-2"></i>Mapa Interactivo</h5>
                    </div>
                    <div class="card-body p-0">
                        <div id="mapa-ith"></div>
                    </div>
                </div>

                <!-- Dirección y Horario -->
                <div class="row g-3 mb-4">

                    <!-- Dirección -->
                    <div class="col-md-6">
                        <div class="card h-100 shadow-sm border-0 info-card">
                            <div class="card-body">
                                <h6 class="text-primary mb-3">
                                    <i class="bi bi-geo-alt me-2"></i>Dirección
                                </h6>
                                <p id="info-direccion" class="text-muted mb-3">
                                    <span class="placeholder-glow"><span class="placeholder col-10"></span></span>
                                </p>
                                <a id="link-maps"
                                    href="https://maps.google.com/?q=Instituto+Tecnologico+de+Huejutla+Hidalgo"
                                    target="_blank" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-box-arrow-up-right me-1"></i>Abrir en Google Maps
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Horario -->
                    <div class="col-md-6">
                        <div class="card h-100 shadow-sm border-0 info-card">
                            <div class="card-body">
                                <h6 class="text-primary mb-3">
                                    <i class="bi bi-clock me-2"></i>Horario de Servicio
                                </h6>

                                <div class="horario-row">
                                    <i class="bi bi-calendar-week text-muted"></i>
                                    <span id="info-dias" class="text-muted">
                                        <span class="placeholder-glow"><span class="placeholder col-6"></span></span>
                                    </span>
                                </div>
                                <div class="horario-row">
                                    <i class="bi bi-clock text-muted"></i>
                                    <span id="info-horas" class="text-muted">
                                        <span class="placeholder-glow"><span class="placeholder col-5"></span></span>
                                    </span>
                                </div>

                                <hr class="my-3">

                                <div class="horario-row">
                                    <i class="bi bi-circle-fill" id="estado-icon"></i>
                                    <span id="estado-texto" class="text-muted">Verificando...</span>
                                </div>

                            </div>
                        </div>
                    </div>

                </div>

                <!-- Contacto rápido -->
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body d-flex flex-wrap gap-3 align-items-center justify-content-center">
                        <span class="text-muted fw-semibold">¿Necesitas contactarnos?</span>
                        <a id="link-telefono" href="#" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-telephone me-1"></i><span id="info-telefono">—</span>
                        </a>
                        <a id="link-email" href="#" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-envelope me-1"></i><span id="info-email">—</span>
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="footer"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Config y utils — PRIMERO -->
    <script src="../assets/js/config/api.config.js"></script>
    <script src="../assets/js/utils/toast.utils.js"></script>
    <script src="../assets/js/utils/auth.utils.js"></script>

    <!-- Componentes -->
    <script src="../assets/js/components/header.js"></script>
    <script src="../assets/js/components/navbar.js"></script>
    <script src="../assets/js/components/footer.js"></script>

    <script src="../assets/js/services/acerca.service.js"></script>
    <script src="../assets/js/pages/ubicacion.js"></script>

    <script src="../assets/js/components/accesibilidad.panel.js"></script>

    <link rel="stylesheet" href="../assets/css/notificaciones.panel.css">
    <script src="../assets/js/components/notificaciones.publica.js"></script>
</body>

</html>
