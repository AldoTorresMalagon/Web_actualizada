<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubicación - Cafetería ITH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <div id="header"></div>
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <main class="container my-5 flex-grow-1 fade-in">
        <div class="row justify-content-center">
            <div class="col-lg-10">

                <h2 class="text-center mb-4">
                    <i class="bi bi-geo-alt me-2"></i>Nuestras Ubicaciones
                </h2>

                <!-- ubicación  -->
                <div id="ubicaciones-lista">
                    <div class="text-center py-4">
                        <div class="loading-spinner mx-auto mb-3"></div>
                        <p class="text-muted">Cargando ubicaciones...</p>
                    </div>
                </div>

                <!-- Mapa -->
                <div class="card shadow-sm mt-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">
                            <i class="bi bi-map me-2"></i>Encuéntranos
                        </h5>
                        <div class="bg-light rounded p-4 text-center">
                            <i class="bi bi-map icon-qr"></i>
                            <p class="mt-3 text-muted">Mapa de ubicación de la cafetería</p>
                            <small class="text-muted">(Integrar mapa interactivo aquí)</small>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <a href="inicio.html" class="btn btn-primary btn-lg">
                        <i class="bi bi-arrow-left me-2"></i>Volver al Inicio
                    </a>
                </div>

            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/components/header.js"></script>
    <script src="../assets/js/components/navbar.js"></script>
    <script src="../assets/js/components/footer.js"></script>
    <script src="../assets/js/pages/ubicacion.js"></script>
</body>

</html>
