<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Cafetería ITH</title>

    <!-- Accesibilidad -->
    <script src="../assets/js/config/accesibilidad.init.js"></script>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Estilos globales -->
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/accesibilidad.css">

    <!-- Estilos específicos -->
    <link rel="stylesheet" href="../assets/css/pages/menu.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- HEADER -->
    <div id="header"></div>
    <!-- NAVBAR -->
    <div id="navbar"></div>
    <!-- SIDEBAR -->
    <div id="sidebar"></div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container my-5 flex-grow-1 fade-in">

        <!-- Título de sección -->
        <section class="text-center mb-4">
            <h2 class="display-5 fw-bold mb-2">
                <i class="bi bi-box-seam text-primary me-2"></i>Productos
            </h2>
            <p class="text-muted">Snacks, botanas y antojitos para cualquier hora</p>
        </section>

        <!-- Alerta para usuarios no autenticados -->
        <div id="alerta-login" class="alert alert-info d-none mb-4">
            <i class="bi bi-info-circle me-2"></i>
            <a href="login.html" class="alert-link">Inicia sesión</a>
            para poder agregar productos a tu carrito.
        </div>

        <!-- Barra de búsqueda y ordenamiento -->
        <div class="row g-3 mb-4 align-items-center">
            <div class="col-12 col-md-7">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" id="buscador" class="form-control border-start-0"
                        placeholder="Buscar productos..." autocomplete="off">
                </div>
            </div>
            <div class="col-12 col-md-5">
                <select id="ordenamiento" class="form-select">
                    <option value="default">Ordenar por...</option>
                    <option value="nombre-asc">Nombre (A - Z)</option>
                    <option value="nombre-desc">Nombre (Z - A)</option>
                    <option value="precio-asc">Precio (menor a mayor)</option>
                    <option value="precio-desc">Precio (mayor a menor)</option>
                </select>
            </div>
        </div>

        <!-- Grid de tarjetas -->
        <div id="productos-grid" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">

            <!-- Estado de carga inicial -->
            <div id="loading-state" class="col-12 text-center py-5">
                <div class="loading-spinner mx-auto mb-3"></div>
                <p class="text-muted">Cargando productos...</p>
            </div>
        </div>

        <!-- Estado vacío -->
        <div id="empty-state" class="text-center py-5 d-none">
            <i class="bi bi-box-seam display-1 text-muted mb-3 d-block"></i>
            <h5 class="text-muted">No se encontraron productos</h5>
            <p class="text-muted small">Intenta con otro término de búsqueda</p>
        </div>

    </main>

    <!-- FOOTER -->
    <div id="footer"></div>

    <!-- Bootstrap Bundle JS -->
    <script src="../assets/js/config/api.config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Componentes globales -->
    <script src="../assets/js/components/header.js"></script>
    <script src="../assets/js/components/navbar.js"></script>
    <script src="../assets/js/components/footer.js"></script>

    <!-- Config y utils -->
    <script src="../assets/js/utils/toast.utils.js"></script>
    <script src="../assets/js/utils/format.utils.js"></script>
    <script src="../assets/js/utils/auth.utils.js"></script>

    <!-- Lógica de esta página -->
    <script>
        window.PAGE_CATEGORY = 'productos';
        window.PAGE_ICON = 'bi-box-seam';
    </script>
    <script src="../assets/js/services/productos.service.js"></script>
    <script src="../assets/js/pages/menu.js"></script>

    <script src="../assets/js/components/accesibilidad.panel.js"></script>
</body>

</html>
