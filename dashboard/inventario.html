<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Inventario - Cafetería ITH</title>

    <!-- Favicon -->
    <link href="../assets/images/favicon/favicon.ico" rel="icon" type="image/x-icon" />
    <link href="../assets/images/favicon/favicon-32x32.png" rel="icon" sizes="32x32" type="image/png" />
    <link href="../assets/images/favicon/favicon-16x16.png" rel="icon" sizes="16x16" type="image/png" />
    <link href="../assets/images/favicon/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180" />
    <link href="../assets/images/favicon/site.webmanifest" rel="manifest" />
    <meta content="#0b265c" name="theme-color" />

    <!-- Accesibilidad -->
    <script src="../assets/js/config/accesibilidad.init.js"></script>
    
    <script src="../assets/js/config/bootstrap.loader.js"></script>
    <link href="../assets/css/variables.css" rel="stylesheet" />
    <link href="../assets/css/main.css" rel="stylesheet" />
    <link href="../assets/css/components.css" rel="stylesheet" />
    <link href="../assets/css/accesibilidad.css" rel="stylesheet" />
    <link href="../assets/css/dashboard.css" rel="stylesheet" />
</head>

<body class="d-flex flex-column min-vh-100">
    <div id="dash-header"></div>
    <div class="dash-wrapper">
        <div id="dash-sidebar"></div>
        <main class="dash-main flex-grow-1 p-4">
            <div class="position-relative d-flex align-items-center mb-4">
                <h2 class="mb-0 w-100 text-center">
                    <i class="bi bi-clipboard-check me-2"></i>Inventario
                </h2>
                <div class="position-absolute end-0 d-flex align-items-center gap-2 flex-wrap justify-content-end">
                    <!-- Selector de período para exportar -->
                    <div class="d-flex align-items-center gap-1" id="filtro-exportar">
                        <div class="btn-group btn-group-sm" id="selector-periodo-export">
                            <button class="btn btn-outline-secondary active" data-periodo-export="hoy">Hoy</button>
                            <button class="btn btn-outline-secondary" data-periodo-export="semana">Semana</button>
                            <button class="btn btn-outline-secondary" data-periodo-export="personalizado">
                                <i class="bi bi-calendar-range"></i>
                            </button>
                        </div>

                        <!-- Rango personalizado — oculto por defecto -->
                        <div class="d-none d-flex align-items-center gap-1" id="rango-export">
                            <input class="form-control form-control-sm" id="export-desde" style="max-width:130px;"
                                type="date" />
                            <span class="text-muted small">—</span>
                            <input class="form-control form-control-sm" id="export-hasta" style="max-width:130px;"
                                type="date" />
                        </div>
                        <button class="btn btn-outline-success btn-sm" id="btn-exportar">
                            <i class="bi bi-file-excel me-1"></i>Excel
                        </button>
                    </div>
                    <button class="btn btn-primary btn-sm" id="btn-actualizar-inventario">
                        <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
                    </button>
                </div>
            </div>

            <!-- Tarjetas de estadísticas -->
            <div class="row g-3 mb-4">
                <div class="col-sm-6 col-xl-3">
                    <div class="card text-white bg-primary h-100">
                        <div class="card-body">
                            <h5 class="card-title">Total Productos</h5>
                            <h3 class="mb-0" id="stat-total">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card text-white bg-warning h-100">
                        <div class="card-body">
                            <h5 class="card-title">Stock Bajo (&lt;10)</h5>
                            <h3 class="mb-0" id="stat-stock-bajo">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card text-white bg-danger h-100">
                        <div class="card-body">
                            <h5 class="card-title">Sin Stock</h5>
                            <h3 class="mb-0" id="stat-sin-stock">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card text-white bg-info h-100">
                        <div class="card-body">
                            <h5 class="card-title">Movimientos Hoy</h5>
                            <h3 class="mb-0" id="stat-movimientos-hoy">--</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabla de inventario -->
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <h5 class="mb-0"><i class="bi bi-table me-2"></i>Historial de Movimientos</h5>
                        <div class="d-flex gap-2 flex-wrap">
                            <select class="form-select form-select-sm" id="filtro-stock" style="max-width:160px;">
                                <option value="">Todos</option>
                                <option value="bajo">Stock bajo</option>
                                <option value="sin">Sin stock</option>
                                <option value="normal">Stock normal</option>
                            </select>
                            <input class="form-control form-control-sm" id="buscador-inventario"
                                placeholder="Buscar producto..." style="max-width:220px;" type="text" />
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>Producto</th>
                                    <th>Stock</th>
                                    <th>Movimiento</th>
                                    <th>Fecha</th>
                                    <th width="80">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-inventario">
                                <tr>
                                    <td class="text-center py-4 text-muted" colspan="5">Cargando inventario...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Ajustar Stock -->
    <div class="modal fade" id="ajustarStockModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title"><i class="bi bi-boxes me-2"></i>Ajustar Stock</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body">
                    <input id="stock-producto-id" type="hidden" />
                    <p>Producto: <strong id="stock-producto-nombre"></strong></p>
                    <p>Stock actual: <strong id="stock-actual"></strong></p>
                    <div class="mb-3">
                        <label class="form-label">Tipo de ajuste</label>
                        <select class="form-select" id="stock-tipo">
                            <option value="entrada">Entrada (agregar)</option>
                            <option value="salida">Salida (reducir)</option>
                            <option value="ajuste">Ajuste directo</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cantidad *</label>
                        <input class="form-control" id="stock-cantidad" min="1" placeholder="0" type="number" />
                        <div class="invalid-feedback" id="stock-cantidad-error"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Motivo</label>
                        <input class="form-control" id="stock-motivo" placeholder="Motivo del ajuste..." type="text" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Cancelar</button>
                    <button class="btn btn-info text-white" id="btn-confirmar-stock" type="button">
                        <i class="bi bi-check-circle me-1"></i>Aplicar Ajuste
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detalles: inventario -->
    <div class="modal fade" id="detalleInventarioModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header" style="background:var(--color-primario,#1E3A5F);color:#fff;">
                    <h5 class="modal-title">
                        <i class="bi bi-clipboard-check me-2"></i>Detalle del Movimiento
                    </h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body" id="detalle-inventario-body">
                    <div class="text-center py-4">
                        <span class="spinner-border text-primary"></span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/config/api.config.js"></script>

    <script src="../assets/js/utils/auth.utils.js"></script>
    <script src="../assets/js/utils/toast.utils.js"></script>
    <script src="../assets/js/utils/format.utils.js"></script>

    <script src="../assets/js/components/dash-header.js"></script>
    <script src="../assets/js/components/dash-sidebar.js"></script>

    <script src="../assets/js/services/productos.service.js"></script>
    <script src="../assets/js/services/inventario.service.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="../assets/js/pages/dashboard/excel.export.js"></script>
    <script src="../assets/js/pages/dashboard/inventario.js"></script>

    <link href="../assets/css/notificaciones.panel.css" rel="stylesheet" />
    <script src="../assets/js/components/notificaciones.panel.js"></script>
    <script src="../assets/js/components/accesibilidad.panel.js"></script>
</body>

</html>
