<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Cafetería ITH</title>

    <!-- Accesibilidad -->
    <script src="../assets/js/config/accesibilidad.init.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/accesibilidad.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <div id="dash-header"></div>

    <div class="dash-wrapper">
        <div id="dash-sidebar"></div>

        <main class="dash-main flex-grow-1 p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0"><i class="bi bi-clipboard-check me-2"></i>Inventario</h2>
                <div class="btn-toolbar gap-2">
                    <button class="btn btn-outline-secondary btn-sm" id="btn-exportar">
                        <i class="bi bi-download me-1"></i>Exportar
                    </button>
                    <button class="btn btn-primary btn-sm" id="btn-actualizar-inventario">
                        <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
                    </button>
                </div>
            </div>

            <!-- Tarjetas de estadísticas -->
            <div class="row g-3 mb-4">
                <div class="col-sm-6 col-xl-3">
                    <div class="card text-white bg-primary h-100">
                        <div class="card-body">
                            <h5 class="card-title">Total Productos</h5>
                            <h3 class="mb-0" id="stat-total">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card text-white bg-warning h-100">
                        <div class="card-body">
                            <h5 class="card-title">Stock Bajo (&lt;10)</h5>
                            <h3 class="mb-0" id="stat-stock-bajo">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card text-white bg-danger h-100">
                        <div class="card-body">
                            <h5 class="card-title">Sin Stock</h5>
                            <h3 class="mb-0" id="stat-sin-stock">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card text-white bg-success h-100">
                        <div class="card-body">
                            <h5 class="card-title">Valor Total</h5>
                            <h3 class="mb-0" id="stat-valor-total">--</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabla de inventario -->
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <h5 class="mb-0"><i class="bi bi-table me-2"></i>Historial de Movimientos</h5>
                        <div class="d-flex gap-2 flex-wrap">
                            <select id="filtro-stock" class="form-select form-select-sm" style="max-width:150px;">
                                <option value="">Todos</option>
                                <option value="bajo">Stock bajo</option>
                                <option value="sin">Sin stock</option>
                                <option value="normal">Stock normal</option>
                            </select>
                            <select id="filtro-categoria" class="form-select form-select-sm" style="max-width:180px;">
                                <option value="">Todas las categorías</option>
                            </select>
                            <input type="text" id="buscador-inventario" class="form-control form-select-sm"
                                placeholder="Buscar producto...">
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>Producto</th>
                                    <th>Código</th>
                                    <th>Stock Anterior</th>
                                    <th>Stock Nuevo</th>
                                    <th>Movimiento</th>
                                    <th>Cantidad</th>
                                    <th>Usuario</th>
                                    <th>Observaciones</th>
                                    <th>Fecha</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-inventario">
                                <tr>
                                    <td colspan="9" class="text-center py-4 text-muted">Cargando inventario...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Ajustar Stock -->
    <div class="modal fade" id="ajustarStockModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title"><i class="bi bi-boxes me-2"></i>Ajustar Stock</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="stock-producto-id">
                    <p>Producto: <strong id="stock-producto-nombre"></strong></p>
                    <p>Stock actual: <strong id="stock-actual"></strong></p>
                    <div class="mb-3">
                        <label class="form-label">Tipo de ajuste</label>
                        <select id="stock-tipo" class="form-select">
                            <option value="entrada">Entrada (agregar)</option>
                            <option value="salida">Salida (reducir)</option>
                            <option value="ajuste">Ajuste directo</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cantidad *</label>
                        <input type="number" id="stock-cantidad" class="form-control" min="1" placeholder="0">
                        <div class="invalid-feedback" id="stock-cantidad-error"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Motivo</label>
                        <input type="text" id="stock-motivo" class="form-control" placeholder="Motivo del ajuste...">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-info text-white" id="btn-confirmar-stock">
                        <i class="bi bi-check-circle me-1"></i>Aplicar Ajuste
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/config/api.config.js"></script>
    <script src="../assets/js/utils/auth.utils.js"></script>
    <script src="../assets/js/utils/toast.utils.js"></script>
    <script src="../assets/js/utils/format.utils.js"></script>

    <script src="../assets/js/components/dash-header.js"></script>
    <script src="../assets/js/components/dash-sidebar.js"></script>
    <script src="../assets/js/services/productos.service.js"></script>
    <script src="../assets/js/services/inventario.service.js"></script>
    <script src="../assets/js/pages/dashboard/inventario.js"></script>
    <script src="../assets/js/components/accesibilidad.panel.js"></script>
</body>

</html>
